# Kitty Keybindings
# Spec: 001-kitty-terminal-migration / ADR-3 (context-aware navigation)
# Spec: 002-overlay-and-stacked-panes / ADR-6 (scratchpad) / ADR-7 (vim nav) / ADR-8 (picker) / ADR-9 (stack cycle)

# ─── PANE (WINDOW) MANAGEMENT ──────────────────────────────────────
map cmd+d          launch --location=vsplit --cwd current
map cmd+shift+d    launch --location=hsplit --cwd current
map cmd+w          close_window
map cmd+shift+w    close_tab

# ─── PANE NAVIGATION (vim-kitty-navigator) ─────────────────────────
# ctrl+hjkl navigates seamlessly between kitty panes and vim splits.
# pass_keys.py detects vim focus and passes the key through to vim instead.
map ctrl+h kitten pass_keys.py left   ctrl+h
map ctrl+j kitten pass_keys.py bottom ctrl+j
map ctrl+k kitten pass_keys.py top    ctrl+k
map ctrl+l kitten pass_keys.py right  ctrl+l

# ─── STACK CYCLE NAVIGATION (ADR-9) ────────────────────────────────
# Cycles through all windows in tab. Works in stack layout where opt+hjkl no-ops.
# opt+9 = previous, opt+0 = next (split-keyboard friendly — no brackets needed)
map opt+9          previous_window
map opt+0          next_window

# ─── TAB NAVIGATION ────────────────────────────────────────────────
map cmd+t          new_tab_with_cwd
map cmd+1          goto_tab 1
map cmd+2          goto_tab 2
map cmd+3          goto_tab 3
map cmd+4          goto_tab 4
map cmd+5          goto_tab 5
map cmd+6          goto_tab 6
map cmd+7          goto_tab 7
map cmd+8          goto_tab 8
map cmd+9          goto_tab 9
map cmd+shift+]    next_tab
map cmd+shift+[    previous_tab
map opt+h          previous_tab
map opt+l          next_tab

# ─── LAYOUT CYCLING ────────────────────────────────────────────────
map cmd+l          next_layout

# ─── OVERLAY / FLOATING PANE ────────────────────────────────────────
# Centered overlay with zsh — inherits CWD from focused pane (requires shell integration).
map cmd+f          launch --type=overlay --title=overlay zsh -c 'printf "\033]11;#1d0b2e\007"; exec zsh'

# ─── ZOOM (STACK LAYOUT TOGGLE) ────────────────────────────────────
map cmd+shift+f    toggle_layout stack

# ─── OS WINDOW ─────────────────────────────────────────────────────
map cmd+n          new_os_window

# ─── VISUAL PANE PICKER (ADR-8) ────────────────────────────────────
# Shows numbered overlay on each pane — press number to jump. Works in all layouts.
map cmd+;          focus_visible_window

# ─── CLIPBOARD ─────────────────────────────────────────────────────
# Copies selection and shows a macOS notification as visual feedback.
# copy_on_select (kitty.conf) handles auto-copy on highlight silently;
# this binding adds the notification for explicit Cmd+C copies.
map cmd+c combine : copy_to_clipboard : launch --type=background sh -c "osascript -e 'display notification \"Copied to clipboard\" with title \"Kitty\"'"

# Extracts clipboard screenshot (Ctrl+Cmd+Shift+4) to /tmp/screenshot_TIMESTAMP.png
# and inserts the file path at the Claude Code CLI prompt. No newline appended.
# Spec: 004-claude-screenshot-paste / ADR-3
map ctrl+period launch --type=background zsh /Users/t026chirv/.config/kitty/paste_screenshot.sh

# ─── SCROLLBACK & HINTS ────────────────────────────────────────────
map cmd+shift+h    show_scrollback
map cmd+e          launch --type=overlay kitty +kitten hints
