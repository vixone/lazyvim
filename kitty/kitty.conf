# Kitty Terminal Configuration
# Spec: 001-kitty-terminal-migration

# ─── FONTS ─────────────────────────────────────────────────────────
font_family      RobotoMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        16.0

# ─── DISPLAY ───────────────────────────────────────────────────────
window_padding_width     8
tab_bar_edge             bottom
tab_bar_style            powerline
tab_powerline_style      round
tab_title_template       "{tab.active_wd.rsplit('/', 1)[-1]}{(' ⊞' + str(num_windows)) if layout_name == 'stack' and num_windows > 1 else ''}"
active_tab_title_template "{(session_name + ' › ') if session_name else ''}{tab.active_wd.rsplit('/', 1)[-1]}{(' ⊞' + str(num_windows)) if layout_name == 'stack' and num_windows > 1 else ''}"
tab_bar_min_tabs         2
active_tab_font_style    bold
inactive_tab_font_style  normal
remember_window_size     yes

# ─── CLIPBOARD ─────────────────────────────────────────────────────
copy_on_select  yes

# ─── SCROLLBACK ────────────────────────────────────────────────────
scrollback_lines  4000
scrollback_pager  less +G -R

# ─── BELLS & CURSOR ────────────────────────────────────────────────
enable_audio_bell       no
visual_bell_duration    0
cursor_blink_interval   0

# ─── PERFORMANCE ───────────────────────────────────────────────────
sync_to_monitor  yes
input_delay      0
repaint_delay    10

# ─── LAYOUTS ───────────────────────────────────────────────────────
enabled_layouts  tall,fat,grid,stack

# ─── SHELL INTEGRATION ─────────────────────────────────────────────
shell_integration  enabled

# ─── REMOTE CONTROL (required for overlay / Cmd+F) ─────────────────
allow_remote_control  yes
listen_on             unix:/tmp/kitty

# ─── OPACITY (required for quick-access-terminal frosted effect) ────
dynamic_background_opacity  yes

# ─── INCLUDES ──────────────────────────────────────────────────────
include theme.conf
include keybindings.conf
