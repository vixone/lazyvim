# Quick-Access Terminal (Scratchpad) Configuration
# Spec: 002-overlay-and-stacked-panes / ADR-6
# Triggered by: Cmd+F (keybindings.conf)

# Drop down from top of screen (Quake style)
edge top

# Height: ~15 lines
lines 15

# Frosted appearance — semi-transparent background
background_opacity 0.85

# Auto-hide when focus moves away — disabled: causes flicker on macOS (focus returns to parent on cmd release)
hide_on_focus_loss no

# Use panel-specific kitty config: inherits main settings but disables cmd+f
# to prevent double-toggle (panel receiving cmd+f while focus transfers on Cmd hold)
kitty_conf panel-kitty.conf

# Slightly lifted background vs main Tokyonight Night (#1a1b26)
# Adds visual distinction beyond opacity alone
kitty_override background=#1e1f2e
